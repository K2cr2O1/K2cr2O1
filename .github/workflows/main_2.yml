name: Waka Readme Stats

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: "0 0 * * *" # 每天凌晨自动更新

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          # 核心修改：指定你的自建 Wakapi 地址
          # 格式通常为: https://wakapi.yourdomain.com/api
          API_BASE_URL: ${{ secrets.WAKAPI_BASE_URL }}
          # 使用你在 Wakapi 账户中生成的 API Key
          WAKATIME_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
          
          # 展示设置
          SECTION_NAME: waka
          BLOCKS: 🟩
          TIME_RANGE: all_time # 统计所有历史数据
          SHOW_TIME: true
          SHOW_TITLE: true
          SHOW_MASKED_TIME: false
