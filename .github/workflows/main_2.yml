name: Waka Readme Stats
on:
  schedule:
    # 每天凌晨 0 点自动更新
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          BLOCKS: 🟩
          TIME_RANGE: all_time # 关键参数：统计全部时间的数据
          SHOW_TIME: true
          SHOW_MASKED_TIME: false
