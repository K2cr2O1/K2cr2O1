# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # 每 6 小时自动更新一次
  schedule: [{cron: "0 */6 * * *"}]
  # 支持手动触发和代码推送时触发
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 第一步：生成左侧统计图（包含基础信息、核心语言分析、精选仓库）
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: left.svg
          user: K2cr2O1
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai
          
          # 语言分析：侧重展示 Go 和 Rust，忽略 HTML/CSS 等干扰项
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, tex
          
          # 仓库展示：突出你的重点项目 Neobot 和 Touhou-translate
          plugin_repositories: yes
          plugin_repositories_featured: Fairy-Oracle-Sanctuary/Touhou-translate, K2cr2O1/Neobot

      # 第二步：生成右侧统计图（包含成就、LeetCode 进度、活动动态）
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: right.svg
          user: K2cr2O1
          base: metadata
          config_timezone: Asia/Shanghai
          
          # 展示 GitHub 成就奖章
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          
          # 展示 LeetCode 刷题数据（匹配你的算法练习习惯）
          plugin_leetcode: yes
          plugin_leetcode_user: K2cr2O1
          plugin_leetcode_sections: solved, participation
          
          # 展示最近的活动动态
          plugin_activity: yes
          plugin_activity_limit: 5
